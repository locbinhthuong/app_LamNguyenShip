name: Build Android APK

on:
  push:
    branches: [ "master" ]
    paths:
      - 'driver-app/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Capacitor Android
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install NPM Dependencies (driver-app)
        run: |
          cd driver-app
          npm install

      - name: Build Frontend React (driver-app)
        run: |
          cd driver-app
          npm run build

      - name: Sync Web Code To Android (Capacitor)
        run: |
          cd driver-app
          npx cap sync android

      - name: Setup Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK Debug (Gradle)
        run: |
          cd driver-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK to Github Actions
        uses: actions/upload-artifact@v3
        with:
          name: TaiXe_LamNguyenShip
          path: driver-app/android/app/build/outputs/apk/debug/app-debug.apk
